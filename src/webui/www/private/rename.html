<!DOCTYPE html>
<html lang="${LANG}">

<head>
    <meta charset="UTF-8" />
    <title>QBT_TR(Rename)QBT_TR[CONTEXT=TransferListWidget]</title>
    <link rel="stylesheet" href="css/style.css" type="text/css" />
    <script src="scripts/lib/mootools-1.2-core-yc.js"></script>
    <script src="scripts/lib/mootools-1.2-more.js"></script>
    <script src="scripts/misc.js?locale=${LANG}"></script>
    <script>
        'use strict';

        var renameKeyboardEvents = new Keyboard({
            defaultEventType: 'keydown',
            events: {
                'enter': function(event) {
                    $('renameButton').click();
                    event.preventDefault();
                }
            }
        });
        renameKeyboardEvents.activate();

        window.addEvent('domready', function() {
            var hash = new URI().getData('hash');
            if (!hash)
                return false;

            var name = new URI().getData('name');
            // set text field to current value
            if (name)
                $('rename').value = escapeHtml(decodeURIComponent(name));

            $('rename').focus();

            var fileId = new URI().getData('id');
            if (fileId) {
                var lastDotIndex = name.lastIndexOf('.');
                if ((lastDotIndex > 3) && (name.substring(lastDotIndex - 4, lastDotIndex).toLowerCase() === ".tar"))
                    lastDotIndex -= 4;
                if (lastDotIndex > 0)
                    $('rename').setSelectionRange(0, lastDotIndex);
            }

            $('renameButton').addEvent('click', function(e) {
                new Event(e).stop();
                // check field
                var newName = $('rename').value.trim();
                if ((newName === null) || (newName === ""))
                    return false;

                if (fileId) {
                    new Request({
                        url: 'api/v2/torrents/renameFile',
                        method: 'post',
                        data: {
                            hash: hash,
                            id: fileId,
                            name: newName
                        },
                        onComplete: function() {
                            window.parent.closeWindows();
                        }
                    }).send();
                }
                else {
                    new Request({
                        url: 'api/v2/torrents/rename',
                        method: 'post',
                        data: {
                            hash: hash,
                            name: newName
                        },
                        onComplete: function() {
                            window.parent.closeWindows();
                        }
                    }).send();
                }
            });
        });
    </script>
</head>

<body>
    <div style="padding: 10px 10px 0px 10px;">
        <p style="font-weight: bold;">QBT_TR(New name)QBT_TR[CONTEXT=TransferListWidget]:</p>
        <input type="text" id="rename" value="" maxlength="100" style="width: 220px;" />
        <div style="text-align: center; padding-top: 10px;">
            <input type="button" value="QBT_TR(Save)QBT_TR[CONTEXT=HttpServer]" id="renameButton" />
        </div>
    </div>
</body>

</html>
